<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0F4C3A">
<title>Stroke Play — Live Scoring</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --fairway: #0F4C3A;
  --fairway-dark: #0A3528;
  --gold: #C9A961;
  --gold-light: #E5CC92;
  --cream: #F5EFE0;
  --paper: #FAF8F2;
  --ink: #1A1A1A;
  --muted: #6B7268;
  --border: #E5DFCD;
  --birdie: #C53030;     /* rouge bogey/double */
  --par: #2563EB;        /* bleu par */
  --green-birdie: #16A34A;/* vert birdie */
  --eagle: #047857;      /* vert foncé eagle */
  --shadow: 0 1px 3px rgba(15,76,58,0.06), 0 4px 12px rgba(15,76,58,0.08);
  --shadow-lg: 0 4px 16px rgba(15,76,58,0.12);
  --radius: 14px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--cream); color: var(--ink);
  font-size: 15px; line-height: 1.5;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}
body { min-height: 100vh; }

h1, h2, h3 { font-family: 'Fraunces', serif; font-weight: 600; margin: 0; }
h1 { font-size: 26px; }
h2 { font-size: 20px; }
h3 { font-size: 17px; }

.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }

/* ─── HEADER ─────────────────────────────────────── */
.header {
  background: var(--fairway); color: var(--cream);
  padding: 14px 12px; padding-top: max(14px, env(safe-area-inset-top));
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.header-btn {
  background: transparent; color: var(--cream); border: none;
  font-size: 20px; cursor: pointer; padding: 4px 10px;
  border-radius: 6px;
}
.header-btn:active { background: rgba(255,255,255,0.15); }
.header-title {
  flex: 1; text-align: center; min-width: 0;
}
.header-title h1 {
  font-size: 17px; font-weight: 600; color: var(--cream);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.header-subtitle {
  font-size: 11px; opacity: 0.75;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ─── CONTENT ────────────────────────────────────── */
.content {
  padding: 14px 12px 80px;
  max-width: 720px; margin: 0 auto;
}

/* ─── BUTTONS ────────────────────────────────────── */
.btn {
  font-family: inherit; font-size: 15px; font-weight: 500;
  border: none; cursor: pointer; padding: 12px 18px;
  border-radius: var(--radius); transition: transform 0.1s;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--gold); color: var(--fairway);
  font-weight: 600;
}
.btn-secondary {
  background: var(--paper); color: var(--ink);
  border: 1px solid var(--border);
}
.btn-fairway {
  background: var(--fairway); color: var(--cream);
}
.btn-danger { background: #FFEBEB; color: var(--birdie); }
.btn-block { width: 100%; }
.btn-sm { padding: 8px 12px; font-size: 13px; }

/* ─── CARDS ──────────────────────────────────────── */
.card {
  background: var(--paper); border-radius: var(--radius);
  padding: 14px; box-shadow: var(--shadow); margin-bottom: 12px;
}
.card-title {
  font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600;
  color: var(--fairway);
}
.card-meta {
  font-size: 12px; color: var(--muted); margin: 2px 0 0;
}

/* ─── INPUTS ─────────────────────────────────────── */
input, select, textarea {
  width: 100%; font-family: inherit; font-size: 15px;
  padding: 11px 13px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); background: var(--paper);
  outline: none;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--fairway);
}
label {
  display: block; font-size: 12px; font-weight: 500;
  color: var(--muted); margin-bottom: 4px; text-transform: uppercase;
  letter-spacing: 0.05em;
}
textarea { font-family: 'Courier New', monospace; font-size: 13px; resize: vertical; }

/* ─── EMPTY STATE ────────────────────────────────── */
.empty {
  text-align: center; padding: 40px 20px;
  color: var(--muted);
}
.empty-icon { font-size: 40px; margin-bottom: 8px; }
.empty-text { font-size: 14px; }

/* ─── MODAL ──────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 1000; animation: fadeIn 0.2s;
}
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
.modal {
  background: var(--paper); width: 100%; max-width: 720px;
  border-top-left-radius: 18px; border-top-right-radius: 18px;
  padding: 16px 14px 24px;
  max-height: 90vh; overflow-y: auto;
  animation: slideUp 0.25s;
  padding-bottom: calc(24px + env(safe-area-inset-bottom));
}
@keyframes slideUp { from {transform: translateY(100%);} to {transform: translateY(0);} }
.modal-handle {
  width: 36px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 0 auto 12px;
}
.modal-actions {
  display: flex; gap: 8px; margin-top: 16px;
}
.modal-actions .btn { flex: 1; }

/* ─── TABS ───────────────────────────────────────── */
.tabs {
  display: flex; border-bottom: 1px solid var(--border);
  background: var(--paper); position: sticky; top: 60px; z-index: 90;
}
.tab-btn {
  flex: 1; padding: 12px 8px; background: transparent; border: none;
  font-family: inherit; font-size: 13px; color: var(--muted);
  cursor: pointer; border-bottom: 2px solid transparent;
  font-weight: 500;
}
.tab-btn.active {
  color: var(--fairway); border-bottom-color: var(--gold);
  font-weight: 600;
}

/* ─── CHECKBOX ROW ───────────────────────────────── */
.checkbox-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 8px; cursor: pointer;
  border-bottom: 1px solid var(--border);
}
.checkbox-row:last-child { border-bottom: none; }
.checkbox-row input[type="checkbox"] {
  width: 20px; height: 20px; flex-shrink: 0; margin: 0;
  accent-color: var(--fairway);
}

/* ─── ICON BUTTONS ───────────────────────────────── */
.icon-btn {
  width: 32px; height: 32px; border: none; background: transparent;
  cursor: pointer; color: var(--muted); font-size: 16px;
  border-radius: 6px;
}
.icon-btn:active { background: var(--cream); }

/* ─── PLAYER ROWS (DB) ───────────────────────────── */
.player-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; background: var(--paper);
  border-radius: var(--radius-sm); margin-bottom: 6px;
  box-shadow: var(--shadow);
}
.player-row-name { font-weight: 500; font-size: 15px; flex: 1; }
.player-row-meta { font-size: 12px; color: var(--muted); }

/* ─── HOLE GRID (course editor) ──────────────────── */
.hole-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 8px; margin-top: 10px;
}
.hole-cell {
  background: var(--paper); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 10px;
}
.hole-cell-num {
  font-family: 'Fraunces', serif; font-weight: 600;
  font-size: 14px; color: var(--fairway); margin-bottom: 4px;
}
.hole-cell-row {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 3px; font-size: 12px;
}
.hole-cell-label { color: var(--muted); width: 28px; }
.hole-cell-input {
  flex: 1; padding: 4px 6px; font-size: 13px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--paper); text-align: center;
}

/* ─── FLIGHT CARDS ───────────────────────────────── */
.flight-card {
  background: var(--paper); border-radius: var(--radius);
  padding: 12px 14px; box-shadow: var(--shadow); margin-bottom: 8px;
}
.flight-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px;
}
.flight-meta { display: flex; align-items: baseline; gap: 12px; min-width: 0; flex: 1; }
.flight-name {
  font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600;
  color: var(--fairway); white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis;
}
.flight-tee { font-size: 14px; color: var(--muted); white-space: nowrap; }
.flight-actions {
  display: flex; align-items: center; gap: 4px; flex-shrink: 0;
}
.flight-code-badge {
  background: var(--cream); color: var(--fairway);
  font-family: 'Fraunces', serif; font-weight: 600;
  font-size: 14px; letter-spacing: 0.1em;
  padding: 4px 10px; border-radius: 6px;
  border: 1px solid var(--border); cursor: pointer;
  margin-right: 4px;
}
.flight-code-badge:active { background: var(--fairway); color: var(--gold); }
.flight-icon-btn {
  width: 30px; height: 30px; border: none; background: transparent;
  cursor: pointer; color: var(--muted); font-size: 14px; border-radius: 6px;
  font-family: inherit;
}
.flight-icon-btn:active { background: var(--cream); }
.flight-icon-danger { color: var(--birdie); }
.flight-players {
  border-top: 1px solid var(--border); padding-top: 8px;
}
.flight-player-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0; font-size: 14px;
}
.flight-player-name { color: var(--ink); }
.flight-player-hcp {
  color: var(--muted); font-size: 12px;
  background: var(--cream); padding: 2px 8px; border-radius: 6px;
}
.flight-empty {
  font-size: 13px; color: var(--muted); font-style: italic;
  border-top: 1px solid var(--border); padding-top: 8px;
}

/* ─── SCORE ENTRY (the famous stepper) ───────────── */
.score-flight-header {
  background: var(--fairway); color: var(--cream);
  padding: 16px 14px; text-align: center;
}
.score-flight-name {
  font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600;
}
.score-flight-info { font-size: 13px; opacity: 0.85; margin-top: 2px; }

.hole-bar {
  background: var(--paper); padding: 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 60px; z-index: 80;
}
.hole-nav-btn {
  background: var(--cream); border: none; width: 44px; height: 44px;
  border-radius: 50%; font-size: 22px; cursor: pointer; color: var(--fairway);
  font-family: 'Fraunces', serif;
}
.hole-nav-btn:disabled { opacity: 0.3; cursor: default; }
.hole-nav-btn:active:not(:disabled) { background: var(--fairway); color: var(--cream); }
.hole-info-center { text-align: center; }
.hole-info-num {
  font-family: 'Fraunces', serif; font-size: 24px; font-weight: 700;
  color: var(--fairway); line-height: 1;
}
.hole-info-par {
  font-size: 12px; color: var(--muted); margin-top: 2px;
  letter-spacing: 0.05em; text-transform: uppercase;
}

.player-score-card {
  background: var(--paper); border-radius: var(--radius);
  padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow);
}
.player-score-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.player-score-name {
  font-weight: 600; font-size: 16px; flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.player-score-total {
  font-size: 12px; color: var(--muted);
  background: var(--cream); padding: 4px 10px; border-radius: 8px;
}

.stepper {
  display: flex; align-items: center; justify-content: center;
  gap: 16px;
}
.stepper-btn {
  width: 56px; height: 56px; border: none; border-radius: 50%;
  background: var(--cream); color: var(--fairway);
  font-size: 28px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fraunces', serif;
  transition: transform 0.1s, background 0.15s;
}
.stepper-btn:active:not(:disabled) {
  transform: scale(0.92); background: var(--fairway); color: var(--cream);
}
.stepper-btn:disabled { opacity: 0.3; cursor: default; }
.stepper-display {
  flex: 1; max-width: 140px; min-width: 100px;
  height: 80px; border-radius: var(--radius);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--cream);
  font-family: 'Fraunces', serif; font-weight: 700;
  position: relative;
  border: 2px solid var(--border);
}
.stepper-value {
  font-size: 36px; line-height: 1;
}
.stepper-label {
  font-size: 11px; font-family: 'Inter', sans-serif; font-weight: 500;
  margin-top: 2px; letter-spacing: 0.05em; text-transform: uppercase;
}

/* Score colors: eagle (or better) / birdie / par / bogey / double+ */
/* Score colors — VIVID (Proposal A v19) */
.score-eagle    { background: #047857; color: #ECFDF5; border-color: #064E3B; }
.score-birdie   { background: #10B981; color: white; border-color: #047857; }
.score-par      { background: #FAFAFA; color: var(--ink); border-color: #94A3B8; }
.score-bogey    { background: #F97316; color: white; border-color: #C2410C; }
.score-double   { background: #EF4444; color: white; border-color: #B91C1C; }
.score-triple   { background: #991B1B; color: white; border-color: #7F1D1D; }
.score-empty    { background: var(--paper); color: var(--muted); border-color: var(--border); border-style: dashed; }

/* ─── LEADERBOARD ────────────────────────────────── */
.leader-table {
  background: var(--paper); border-radius: var(--radius);
  overflow: hidden; box-shadow: var(--shadow);
}
.leader-row {
  display: grid; grid-template-columns: 36px 1fr auto auto;
  align-items: center; gap: 10px;
  padding: 12px 14px; border-bottom: 1px solid var(--border);
}
.leader-row:last-child { border-bottom: none; }
.leader-row.leader-header {
  background: var(--fairway); color: var(--cream);
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
}
.leader-pos {
  font-family: 'Fraunces', serif; font-weight: 600;
  font-size: 16px; color: var(--fairway); text-align: center;
}
.leader-name { font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.leader-name-meta { font-size: 12px; color: var(--muted); }
.leader-score-net, .leader-score-thru {
  font-family: 'Fraunces', serif; font-weight: 600;
  font-size: 16px; color: var(--fairway);
  min-width: 50px; text-align: right;
}
.leader-score-thru { font-size: 12px; color: var(--muted); min-width: 36px; }

/* ─── FC MULTI-FLIGHT VIEW ────────────────────────── */
.fcm-flight {
  background: var(--paper); border-radius: var(--radius);
  padding: 14px; box-shadow: var(--shadow); margin-bottom: 14px;
}
.fcm-flight-header {
  display: flex; align-items: baseline; gap: 10px;
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 2px solid var(--gold);
}
.fcm-flight-name {
  font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600;
  color: var(--fairway);
}
.fcm-flight-tee {
  font-size: 14px; color: var(--muted);
}

/* Per-flight hole nav */
.fcm-hole-bar {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--cream); border-radius: var(--radius-sm);
  padding: 8px 10px; margin-bottom: 12px;
}
.fcm-hole-nav-btn {
  background: var(--paper); border: 1px solid var(--border);
  width: 40px; height: 40px; border-radius: 50%;
  font-size: 18px; cursor: pointer; color: var(--fairway);
  font-family: 'Fraunces', serif; font-weight: 700;
}
.fcm-hole-nav-btn:disabled { opacity: 0.3; cursor: default; }
.fcm-hole-nav-btn:active:not(:disabled) {
  background: var(--fairway); color: var(--cream);
}
.fcm-hole-info {
  text-align: center; flex: 1;
}
.fcm-hole-num-text {
  font-family: 'Fraunces', serif; font-size: 18px; font-weight: 700;
  color: var(--fairway); line-height: 1.1;
}
.fcm-hole-par-text {
  font-size: 11px; color: var(--muted);
  letter-spacing: 0.05em; text-transform: uppercase;
}
.fcm-row {
  display: grid; grid-template-columns: 1fr auto;
  align-items: center; gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.fcm-row:last-child { border-bottom: none; }
.fcm-row-name {
  font-weight: 600; font-size: 15px;
  min-width: 0; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap;
}
.fcm-row-name-meta {
  font-size: 12px; color: var(--muted); margin-top: 2px;
}
.fcm-stepper {
  display: flex; align-items: center; gap: 10px;
}
.fcm-stepper-btn {
  width: 44px; height: 44px; border: none; border-radius: 50%;
  background: var(--fairway); color: var(--cream);
  font-size: 22px; font-weight: 700; cursor: pointer;
  font-family: 'Fraunces', serif;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 4px rgba(15,76,58,0.15);
}
.fcm-stepper-btn:active:not(:disabled) {
  transform: scale(0.92); background: var(--fairway-dark);
}
.fcm-stepper-btn:disabled { opacity: 0.3; cursor: default; }
.fcm-stepper-display {
  width: 68px; height: 50px; border-radius: var(--radius-sm);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: 'Fraunces', serif; font-weight: 700;
  border: 3px solid;
}
.fcm-stepper-value { font-size: 24px; line-height: 1; }
.fcm-stepper-label {
  font-size: 9px; font-family: 'Inter', sans-serif; font-weight: 700;
  margin-top: 2px; letter-spacing: 0.05em; text-transform: uppercase;
}

/* Single-flight stepper (admin score screen) — also apply Proposal A */
.stepper-btn {
  background: var(--fairway); color: var(--cream);
}
.stepper-btn:active:not(:disabled) {
  background: var(--fairway-dark); color: var(--cream);
}
.stepper-display { border-width: 3px; }

/* ─── UTILITIES ──────────────────────────────────── */
.hidden { display: none !important; }
.text-muted { color: var(--muted); }
.text-center { text-align: center; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 14px; }
.flex-row { display: flex; gap: 8px; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- LOGIN SCREEN                                                  -->
<!-- ═══════════════════════════════════════════════════════════ -->
<section id="screen-login" class="screen active">
  <div style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 20px; background: linear-gradient(180deg, var(--fairway) 0%, var(--fairway-dark) 100%);">
    <div style="text-align: center; margin-bottom: 30px;">
      <div style="font-size: 56px;">⛳</div>
      <h1 style="color: var(--gold); margin-top: 8px;">Stroke Play</h1>
      <p style="color: var(--cream); opacity: 0.8; margin: 4px 0 0; font-size: 13px;">Live Scoring</p>
    </div>

    <div style="background: var(--paper); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 360px; box-shadow: var(--shadow-lg);">
      <label>Code club</label>
      <input id="login-club" type="text" placeholder="ex: RWGC" autocomplete="off" style="text-transform: uppercase;">

      <label style="margin-top: 12px;">Code d'accès (4 chiffres)</label>
      <input id="login-pin" type="tel" inputmode="numeric" maxlength="4" placeholder="••••" style="text-align: center; font-size: 22px; letter-spacing: 0.4em; font-family: 'Fraunces', serif;">

      <button class="btn btn-primary btn-block" style="margin-top: 16px;" onclick="doLogin()">Entrer</button>

      <div id="login-error" style="margin-top: 10px; color: var(--birdie); font-size: 13px; text-align: center; min-height: 18px;"></div>

      <div style="text-align: center; margin-top: 14px; font-size: 11px; color: var(--muted);">
        <a href="#" onclick="showCreateClub();return false;" style="color: var(--fairway); text-decoration: none;">Créer un nouveau club</a>
      </div>
    </div>

    <div style="margin-top: 20px; color: var(--cream); opacity: 0.6; font-size: 11px;">
      v16 · 2026
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- ADMIN HOME                                                    -->
<!-- ═══════════════════════════════════════════════════════════ -->
<section id="screen-admin" class="screen">
  <header class="header">
    <button class="header-btn" onclick="logout()">←</button>
    <div class="header-title">
      <h1 id="admin-club-name">Club</h1>
      <div class="header-subtitle">Administration</div>
    </div>
    <button class="header-btn" onclick="showAdminMenu()">⋯</button>
  </header>
  <div class="content">
    <h2 style="margin-bottom: 12px;">🏆 Compétitions</h2>
    <div id="admin-comps-list"></div>

/* ═══════════════════════════════════════════════════════════

   ═══════════════════════════════════════════════════════════ */
const state = {
  // Auth
  role: null, // 'admin' | 'marker' | 'forecaddy'
  clubCode: null,
  club: null,
  // Navigation
  compId: null, comp: null,

  lbReturnTo: null,
  // Comp tab
  currentTab: 'setup',
  // Filter for flight player picker
  flightPickerFilter: 'free',
};

const listeners = [];
function listen(ref, evt, cb) {
  ref.on(evt, cb);
  listeners.push({ref, evt, cb});
}
function clearListeners() {
  listeners.forEach(({ref, evt, cb}) => ref.off(evt, cb));
  listeners.length = 0;
}

/* ═══════════════════════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════════════════════ */
function $(id) { return document.getElementById(id); }
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function genPin(n=4) {
  let s = '';
  for (let i = 0; i < n; i++) s += Math.floor(Math.random()*10);
  return s;
}
function show(screenId) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  const el = $(screenId);
  if (el) el.classList.add('active');
  window.scrollTo(0,0);
}
function showModal(html) {
  $('modal-container').innerHTML = html;
}
function closeModal() {
  $('modal-container').innerHTML = '';
}
function getFullName(p) {
  if (!p) return '';
  const fn = (p.firstName || '').trim();
  const ln = (p.name || '').trim();
  if (fn && ln) return fn + ' ' + ln;
  return fn || ln || '';
}
function loginError(msg) {
  $('login-error').textContent = msg;
  setTimeout(() => { $('login-error').textContent = ''; }, 3500);
}

// Get the par for a hole index (0-17), depending on the round/course
function getHolePar(holeIndex, round) {
  if (!state.comp) return 4;
  const courseId = (state.comp.courseIds || [])[round - 1];
  const course = (state.club.courses || {})[courseId];
  if (!course || !course.holes || !course.holes[holeIndex]) return 4;
  return course.holes[holeIndex].par || 4;
}

// Get the SI for a hole index
function getHoleSi(holeIndex, round, gender) {
  if (!state.comp) return holeIndex + 1;
  const courseId = (state.comp.courseIds || [])[round - 1];
  const course = (state.club.courses || {})[courseId];
  if (!course || !course.holes || !course.holes[holeIndex]) return holeIndex + 1;
  const h = course.holes[holeIndex];
  if (gender === 'ladies' && h.siLadies != null) return h.siLadies;
  return h.siMen != null ? h.siMen : (h.si || holeIndex + 1);
}

// Compute total par for a round
function getRoundTotalPar(round) {
  let t = 0;
  for (let i = 0; i < 18; i++) t += getHolePar(i, round);
  return t;
}

// Player score for a round: total strokes
function getPlayerRoundScore(playerId, round) {
  const c = state.comp;
  if (!c) return { strokes: 0, holesPlayed: 0 };
  const scores = (c.scores || {})[playerId] || {};
  const rScores = scores['r' + round] || {};
  let strokes = 0, holesPlayed = 0;
  for (let i = 0; i < 18; i++) {
    if (rScores[i] != null) {
      strokes += rScores[i];
      holesPlayed++;
    }
  }
  return { strokes, holesPlayed };
}

// Player total over all rounds
function getPlayerTotal(playerId) {
  const c = state.comp;
  if (!c) return { strokes: 0, holesPlayed: 0, totalHoles: (c?.holes || 18) };
  const totalHoles = c.holes || 18;
  const rounds = c.holes === 36 ? 2 : 1;
  let strokes = 0, holesPlayed = 0;
  for (let r = 1; r <= rounds; r++) {
    const s = getPlayerRoundScore(playerId, r);
    strokes += s.strokes;
    holesPlayed += s.holesPlayed;
  }
  return { strokes, holesPlayed, totalHoles };
}

// Score class based on diff vs par
function scoreClass(strokes, par) {
  if (strokes == null) return 'score-empty';
  const diff = strokes - par;
  if (diff <= -2) return 'score-eagle';
  if (diff === -1) return 'score-birdie';
  if (diff === 0) return 'score-par';
  if (diff === 1) return 'score-bogey';
  if (diff === 2) return 'score-double';
  return 'score-triple';
}

function scoreLabel(strokes, par) {
  if (strokes == null) return '';
  const diff = strokes - par;
  if (diff === -3) return 'Albatros';
  if (diff === -2) return 'Eagle';
  if (diff === -1) return 'Birdie';
  if (diff === 0) return 'Par';
  if (diff === 1) return 'Bogey';
  if (diff === 2) return 'Double';
  if (diff === 3) return 'Triple';
  if (diff > 3) return '+' + diff;
  return strokes === 1 ? 'Hole-in-1' : '';
}

/* ═══════════════════════════════════════════════════════════
   LOGIN / LOGOUT
   ═══════════════════════════════════════════════════════════ */
async function doLogin() {
  const clubCode = ($('login-club').value || '').trim().toUpperCase();
  const pin = ($('login-pin').value || '').trim();
  if (!clubCode) return loginError('Code club requis');
  if (!/^\d{4}$/.test(pin)) return loginError('Code à 4 chiffres');

  let snap;
  try {
    snap = await dbRef.child('clubs/' + clubCode).once('value');
  } catch (e) { return loginError('Erreur réseau'); }

  const club = snap.val();
  if (!club) return loginError('Club introuvable');

  state.clubCode = clubCode;
  state.club = club;

  // Try admin
  if (club.adminPin === pin) return enterAdmin();

  // Try flight code or fore caddy code
  return enterMarker(pin);
}

function enterAdmin() {
  state.role = 'admin';
  show('screen-admin');
  clearListeners();
  listen(dbRef.child('clubs/' + state.clubCode), 'value', snap => {
    const club = snap.val();
    if (!club) return logout();
    state.club = club;
    if (state.compId) {
      state.comp = (club.competitions || {})[state.compId];
      if (!state.comp && $('screen-comp').classList.contains('active')) {
        // Comp deleted
        state.compId = null;
        show('screen-admin');
      }
    }
    renderActiveAdminScreen();
  });
}

function renderActiveAdminScreen() {
  // Refresh state.comp from latest club
  if (state.compId) {
    state.comp = (state.club.competitions || {})[state.compId] || null;
    if (state.comp && state.flightId) {
      state.flight = (state.comp.flights || {})[state.flightId] || null;
    }
  }
  if ($('screen-admin').classList.contains('active')) renderAdminHome();
  if ($('screen-courses').classList.contains('active')) renderCoursesList();
  if ($('screen-course-edit').classList.contains('active')) renderCourseEditor();
  if ($('screen-players-db').classList.contains('active')) renderPlayersDb();
  if ($('screen-comp').classList.contains('active') && state.comp) renderComp();
  if ($('screen-score').classList.contains('active') && state.flight) renderScoreScreen();
  if ($('screen-fc-multi').classList.contains('active') && state.comp) renderFCMulti();
  if ($('screen-leaderboard-public').classList.contains('active') && state.comp) renderPublicLeaderboard();
}

function logout() {
  state.role = null;
  state.clubCode = null;
  state.club = null;
  state.compId = null; state.comp = null;
  state.flightId = null; state.flight = null;
  state.isAdminScoring = false;
  state.isForeCaddy = false;
  clearListeners();
  $('login-pin').value = '';
  show('screen-login');
}

async function doCreateClub() {
  const code = ($('newclub-code').value || '').trim().toUpperCase();
  const name = ($('newclub-name').value || '').trim();
  const pin = ($('newclub-pin').value || '').trim();
  if (!/^[A-Z0-9]{2,8}$/.test(code)) return alert('Code club: 2-8 lettres/chiffres');
  if (!name) return alert('Nom requis');
  if (!/^\d{4}$/.test(pin)) return alert('PIN: 4 chiffres');

  // Check existence
  const snap = await dbRef.child('clubs/' + code).once('value');
  if (snap.exists()) return alert('Ce code club existe déjà');

  await dbRef.child('clubs/' + code).set({
    name,
    adminPin: pin,
    createdAt: Date.now()
  });
  closeModal();
  $('login-club').value = code;
  $('login-pin').value = pin;
  alert('Club créé ! Tu vas être connecté en admin.');
  doLogin();
}

  const compIds = Object.keys(comps).sort((a,b) => (comps[b].createdAt||0) - (comps[a].createdAt||0));

  if (compIds.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🏆</div><div class="empty-text">Aucune compétition.</div></div>';
  } else {
    list.innerHTML = compIds.map(cid => {
      const c = comps[cid];
      const nFlights = Object.keys(c.flights || {}).length;
      const nPlayers = (c.playerIds || []).length;
      return `<div class="card" onclick="openComp('${cid}')" style="cursor:pointer;">

        <div class="card-meta">

          ${nFlights} flight${nFlights>1?'s':''} · ${nPlayers} joueur${nPlayers>1?'s':''}

  }
}

/* ═══════════════════════════════════════════════════════════
   COURSES (Library)
   ═══════════════════════════════════════════════════════════ */
let currentCourseId = null;

function renderCoursesList() {
  const courses = state.club.courses || {};
  const ids = Object.keys(courses).sort((a,b) => (courses[a].name||'').localeCompare(courses[b].name||''));
  const list = $('courses-list');
  if (ids.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🏞️</div><div class="empty-text">Aucun parcours.</div></div>';
    return;
  }
  list.innerHTML = ids.map(cid => {
    const c = courses[cid];
    const totalPar = (c.holes || []).reduce((s, h) => s + (h?.par || 0), 0);
    return `<div class="card" onclick="openCourse('${cid}')" style="cursor:pointer;">
      <div class="card-title">${escapeHtml(c.name || 'Parcours')}</div>
      <div class="card-meta">${(c.holes||[]).length} trous · Par ${totalPar}</div>
    </div>`;
  }).join('');
}

function newCourse() {
  const name = prompt('Nom du parcours ?');
  if (!name || !name.trim()) return;
  const cid = 'c' + Date.now();
  const holes = [];
  for (let i = 0; i < 18; i++) {
    holes.push({ par: 4, siMen: i+1, siLadies: i+1 });
  }
  dbRef.child('clubs/' + state.clubCode + '/courses/' + cid).set({
    name: name.trim(),
    holes
  }).then(() => {
    currentCourseId = cid;
    show('screen-course-edit');
    renderCourseEditor();
  });
}

function openCourse(cid) {
  currentCourseId = cid;
  show('screen-course-edit');
  renderCourseEditor();
}

function renderCourseEditor() {
  const c = (state.club.courses || {})[currentCourseId];
  if (!c) { show('screen-courses'); return; }
  $('course-edit-name').textContent = c.name || 'Parcours';
  const holes = c.holes || [];

  let totalPar = 0;
  holes.forEach(h => totalPar += (h?.par || 0));

  let html = `
    <div class="card">
      <div class="card-title">${escapeHtml(c.name)}</div>
      <div class="card-meta">18 trous · Par total ${totalPar}</div>
    </div>
    <div class="hole-grid">`;
  for (let i = 0; i < 18; i++) {
    const h = holes[i] || { par:4, siMen:i+1, siLadies:i+1 };
    html += `
      <div class="hole-cell">
        <div class="hole-cell-num">Trou ${i+1}</div>
        <div class="hole-cell-row">
          <span class="hole-cell-label">Par</span>
          <input class="hole-cell-input" type="number" min="3" max="6" value="${h.par||4}" onchange="changePar(${i}, this.value)">
        </div>
        <div class="hole-cell-row">
          <span class="hole-cell-label">SI ♂</span>
          <input class="hole-cell-input" type="number" min="1" max="18" value="${h.siMen||(i+1)}" onchange="changeSi(${i},'siMen',this.value)">
        </div>
        <div class="hole-cell-row">
          <span class="hole-cell-label">SI ♀</span>
          <input class="hole-cell-input" type="number" min="1" max="18" value="${h.siLadies||(i+1)}" onchange="changeSi(${i},'siLadies',this.value)">
        </div>
      </div>`;
  }
  html += '</div>';
  $('course-edit-content').innerHTML = html;
}

function changePar(holeIdx, val) {
  const v = parseInt(val, 10);
  if (isNaN(v) || v < 3 || v > 6) return;
  dbRef.child('clubs/' + state.clubCode + '/courses/' + currentCourseId + '/holes/' + holeIdx + '/par').set(v);
}
function changeSi(holeIdx, key, val) {
  const v = parseInt(val, 10);
  if (isNaN(v) || v < 1 || v > 18) return;
  dbRef.child('clubs/' + state.clubCode + '/courses/' + currentCourseId + '/holes/' + holeIdx + '/' + key).set(v);
}

function renameCurrentCourse() {
  const c = (state.club.courses || {})[currentCourseId];
  if (!c) return;
  const newName = prompt('Nouveau nom :', c.name);
  if (!newName || !newName.trim()) return;
  dbRef.child('clubs/' + state.clubCode + '/courses/' + currentCourseId + '/name').set(newName.trim());
}

function deleteCurrentCourse() {
  if (!confirm('Supprimer ce parcours ? (irréversible)')) return;
  dbRef.child('clubs/' + state.clubCode + '/courses/' + currentCourseId).remove();
  show('screen-courses');
}

/* ═══════════════════════════════════════════════════════════
   PLAYERS DB (Library)
   ═══════════════════════════════════════════════════════════ */
function renderPlayersDb() {
  const players = state.club.playersDB || {};
  const ids = Object.keys(players).sort((a,b) => {
    const an = (players[a].name||'') + ' ' + (players[a].firstName||'');
    const bn = (players[b].name||'') + ' ' + (players[b].firstName||'');
    return an.localeCompare(bn);
  });
  const el = $('players-db-list');
  if (ids.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">Aucun joueur.</div></div>';
    return;
  }
  // Preserve search query if input exists
  const existing = $('playersdb-search');
  const currentQuery = existing ? existing.value : '';
  el.innerHTML = `
    <input type="text" id="playersdb-search" placeholder="🔎 Rechercher (${ids.length} joueurs)..." value="${escapeHtml(currentQuery)}" oninput="filterPlayersDbList(this.value)" autocomplete="off" style="margin-bottom: 10px;">
    <div id="playersdb-list-inner">
      ${ids.map(pid => {
        const p = players[pid];
        const search = ((p.firstName||'') + ' ' + (p.name||'')).toLowerCase();
        return `<div class="player-row" data-search="${escapeHtml(search)}">
          <div style="flex:1;">
            <div class="player-row-name">${escapeHtml(getFullName(p))}</div>
            ${p.hcp != null ? `<div class="player-row-meta">Hcp ${p.hcp}</div>` : ''}
          </div>
          <button class="icon-btn" onclick="editDbPlayer('${pid}')">✎</button>
          <button class="icon-btn" onclick="deleteDbPlayer('${pid}')">×</button>
        </div>`;
      }).join('')}
    </div>`;
  if (currentQuery) filterPlayersDbList(currentQuery);
}

function filterPlayersDbList(query) {
  const q = (query || '').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  document.querySelectorAll('#playersdb-list-inner .player-row').forEach(row => {
    const search = (row.dataset.search || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    row.style.display = (!q || search.indexOf(q) !== -1) ? '' : 'none';
  });
}

function handleImportFile(file) {
  if (typeof XLSX === 'undefined') return alert('Librairie Excel non chargée. Utilise le copier-coller.');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const arr = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: '' });
      const rows = parsePlayerRows(arr);
      if (rows.length === 0) return alert('Aucune ligne lisible.');
      showPlayerImportPreview(rows);
    } catch (err) { alert('Erreur: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function parseImportPaste() {
  const raw = $('import-data').value;
  if (!raw.trim()) return alert('Colle des données.');
  const lines = raw.split(/\r?\n/).map(l => l.trim()).filter(l => l);
  const arr = lines.map(line => line.split(/\t|;/).map(s => s.trim()));
  const rows = parsePlayerRows(arr);
  if (rows.length === 0) return alert('Aucune ligne valide.');
  showPlayerImportPreview(rows);
}

// Generic parser: try to detect "FirstName | LastName | Hcp" or any order
function parsePlayerRows(arr) {
  if (arr.length === 0) return [];
  // Skip header if first row looks like one
  let startIdx = 0;
  if (arr[0]) {
    const firstRow = arr[0].map(c => String(c||'').toLowerCase());
    if (firstRow.some(c => /pr[ée]nom|firstname|nom|name|hcp|handicap/.test(c))) {
      startIdx = 1;
    }
  }
  const out = [];
  for (let i = startIdx; i < arr.length; i++) {
    const cells = (arr[i] || []).map(c => String(c==null?'':c).trim()).filter(c => c.length > 0);
    if (cells.length === 0) continue;
    // Try to find hcp (numeric)
    let hcp = null;
    let nameParts = [];
    cells.forEach(c => {
      const n = parseFloat(c.replace(',','.'));
      if (!isNaN(n) && n >= -10 && n <= 60 && /^-?\d+([.,]\d+)?$/.test(c)) {
        if (hcp == null) hcp = n;
        else nameParts.push(c);
      } else {
        nameParts.push(c);
      }
    });
    if (nameParts.length === 0) continue;
    const full = nameParts.join(' ');
    const split = splitFullName(full);
    out.push({ firstName: split.firstName, lastName: split.lastName, hcp, fullName: full });
  }
  return out;
}

// Detect lastName (CAPS) and firstName (mixed case)
function splitFullName(full) {
  const parts = full.trim().split(/\s+/);
  if (parts.length === 1) return { firstName: '', lastName: parts[0] };
  const isCaps = w => w === w.toUpperCase() && w.length > 1 && /[A-ZÀ-Ý]/.test(w);
  // Try start = lastName
  let i = 0;
  while (i < parts.length && isCaps(parts[i])) i++;
  if (i > 0 && i < parts.length) {
    return { firstName: parts.slice(i).join(' '), lastName: parts.slice(0, i).join(' ') };
  }
  // Try end = lastName
  let j = parts.length;
  while (j > 0 && isCaps(parts[j-1])) j--;
  if (j > 0 && j < parts.length) {
    return { firstName: parts.slice(0, j).join(' '), lastName: parts.slice(j).join(' ') };
  }
  // Default: last word = lastName
  return { firstName: parts.slice(0,-1).join(' '), lastName: parts[parts.length-1] };
}

// Albatros split: lastName (CAPS) first, firstName at end
function splitAlbatrosName(full) {
  const parts = full.trim().split(/\s+/);
  if (parts.length === 1) return { firstName: '', lastName: parts[0] };
  return {
    firstName: parts[parts.length - 1],
    lastName: parts.slice(0, -1).join(' ')
  };
}

function matchPlayer(fullName) {
  const { firstName, lastName } = splitFullName(fullName);
  const pdb = state.club.playersDB || {};
  const norm = s => (s||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const tFn = norm(firstName), tLn = norm(lastName), tFull = norm(fullName);
  for (const pid in pdb) {
    const p = pdb[pid];
    if (norm(p.firstName) === tFn && norm(p.name) === tLn && tLn) return pid;
  }
  for (const pid in pdb) {
    const p = pdb[pid];
    if (norm(p.firstName) === tLn && norm(p.name) === tFn && tFn) return pid;
  }
  for (const pid in pdb) {
    const p = pdb[pid];
    const a = norm((p.firstName||'')+' '+(p.name||''));
    const b = norm((p.name||'')+' '+(p.firstName||''));
    if (a === tFull || b === tFull) return pid;
  }
  return null;
}

function showPlayerImportPreview(rows) {
  // Match against existing
  rows.forEach(r => {
    r.matchedPid = matchPlayer(r.fullName);
    if (r.matchedPid) {
      const ex = state.club.playersDB[r.matchedPid];
      if (ex && ex.hcp !== r.hcp && r.hcp != null) r.action = 'update-hcp';
      else r.action = 'use-existing';
    } else {
      r.action = 'create';
    }
  });
  importState.rows = rows;
  const newCount = rows.filter(r => r.action === 'create').length;
  const updCount = rows.filter(r => r.action === 'update-hcp').length;
  let html = `
    <div class="modal-overlay" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <h3>Aperçu — ${rows.length} joueur${rows.length>1?'s':''}</h3>
        <div style="display:flex; gap:8px; margin: 8px 0 14px; flex-wrap: wrap; font-size: 12px;">
          ${newCount ? `<span style="background: #FFF4D6; color: #6B4A00; padding: 3px 8px; border-radius: 8px;">+ ${newCount} nouveau${newCount>1?'x':''}</span>` : ''}
          ${updCount ? `<span style="background: #FFEBEB; color: var(--birdie); padding: 3px 8px; border-radius: 8px;">${updCount} hcp à m.à.j</span>` : ''}
        </div>
        <div style="max-height: 50vh; overflow-y: auto;">
  `;
  rows.forEach((r, i) => {
    let badge;
    if (r.action === 'use-existing') badge = '<span style="font-size:10px; color:var(--fairway); background:#E6F0EB; padding:2px 6px; border-radius:6px;">EN BASE</span>';
    else if (r.action === 'update-hcp') {
      const oldHcp = state.club.playersDB[r.matchedPid].hcp;
      badge = `<span style="font-size:10px; color:#6B4A00; background:#FFF4D6; padding:2px 6px; border-radius:6px;">HCP ${oldHcp != null ? oldHcp : '—'} → ${r.hcp}</span>`;
    } else badge = '<span style="font-size:10px; color:#6B4A00; background:#FFF4D6; padding:2px 6px; border-radius:6px;">+ NOUVEAU</span>';
    html += `<div style="display:flex; align-items:center; gap:8px; padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--border);">
      <span style="flex:1;">${escapeHtml(r.firstName)} <b>${escapeHtml(r.lastName)}</b>${r.hcp != null ? ` <span style="color:var(--muted);">(${r.hcp})</span>` : ''}</span>
      ${badge}
    </div>`;
  });
  html += `
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
          <button class="btn btn-primary" onclick="doImportPlayers()">Importer</button>
        </div>
      </div>
    </div>`;
  showModal(html);
}

async function doImportPlayers() {
  const rows = importState.rows;
  const updates = {};
  let nNew = 0, nUpd = 0;
  rows.forEach(r => {
    if (r.action === 'create') {
      const pid = 'p' + Date.now() + Math.floor(Math.random()*100000) + nNew;
      const data = { firstName: r.firstName, name: r.lastName };
      if (r.hcp != null) data.hcp = r.hcp;
      updates[pid] = data;
      nNew++;
    } else if (r.action === 'update-hcp' && r.matchedPid) {
      const ex = state.club.playersDB[r.matchedPid];
      const data = { firstName: ex.firstName, name: ex.name };
      if (r.hcp != null) data.hcp = r.hcp;
      updates[r.matchedPid] = data;
      nUpd++;
    }
  });
  if (Object.keys(updates).length === 0) {
    closeModal(); return alert('Rien à importer.');
  }
  await dbRef.child('clubs/' + state.clubCode + '/playersDB').update(updates);
  closeModal();
  alert(`Import OK · ${nNew} nouveau${nNew>1?'x':''} · ${nUpd} mis à jour`);
}

/* Albatros file handler */
const albatrosState = { flights: [] };

function handleAlbatrosFile(file) {
  if (typeof XLSX === 'undefined') return alert('Librairie Excel non chargée.');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      let bestRows = [];
      for (const sn of wb.SheetNames) {
        const ws = wb.Sheets[sn];
        const arr = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: '' });
        const rows = parseAlbatrosRows(arr);
        if (rows.length > bestRows.length) bestRows = rows;
      }
      if (bestRows.length === 0) return alert('Aucun flight Albatros détecté.');
      if (importState.mode === 'players') {
        // Convert flights → flat list of players
        const players = [];
        bestRows.forEach(fl => fl.players.forEach(p => players.push({
          firstName: p.firstName, lastName: p.lastName, hcp: p.hcp, fullName: p.fullName
        })));
        showAlbatrosPlayersPreview(players);
      } else {
        showAlbatrosFlightsPreview(bestRows);
      }
    } catch (err) { alert('Erreur: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function parseAlbatrosRows(arr) {
  const flights = [];
  let cur = null;
  const teeRe = /^\s*(\d{1,2}):(\d{2})\s+AT\s+HOLE\s+(\d{1,2})\s*$/i;
  const flightRe = /^\s*Flight\s*[:.]?\s*\d+\s*$/i;
  for (let i = 0; i < arr.length; i++) {
    const cells = (arr[i] || []).map(c => String(c==null?'':c).trim());
    const c0 = cells[0] || '', c1 = cells[1] || '', c2 = cells[2] || '';
    const m = c0.match(teeRe);
    if (m) {
      cur = { time: m[1].padStart(2,'0') + ':' + m[2], holeStart: parseInt(m[3],10), players: [] };
      flights.push(cur);
      if (c1) {
        const sp = splitAlbatrosName(c1);
        cur.players.push({ fullName: c1, firstName: sp.firstName, lastName: sp.lastName, hcp: parseAlbatrosHcp(c2) });
      }
      continue;
    }
    if (flightRe.test(c0)) continue;
    if (cur && c1) {
      const sp = splitAlbatrosName(c1);
      cur.players.push({ fullName: c1, firstName: sp.firstName, lastName: sp.lastName, hcp: parseAlbatrosHcp(c2) });
    }
  }
  return flights.filter(f => f.players.length > 0);
}

function parseAlbatrosHcp(s) {
  if (s == null || s === '') return null;
  const n = parseFloat(String(s).replace(',', '.'));
  if (isNaN(n) || n < -10 || n > 60) return null;
  return n;
}

function showAlbatrosPlayersPreview(players) {
  // Same logic as showPlayerImportPreview, just from Albatros data
  importState.rows = players.map(p => ({ ...p }));

      else r.action = 'use-existing';
    } else r.action = 'create';
  });
  showPlayerImportPreview(importState.rows);
}

    fl.players.forEach(pl => {

      } else badge = '<span style="font-size:10px; color:#6B4A00; background:#FFF4D6; padding:2px 6px; border-radius:6px;">+ NOUVEAU</span>';
      html += `<div style="display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13px;">

function toggleAlbatrosFlight(idx, included) {
  if (albatrosState.flights[idx]) albatrosState.flights[idx].included = included;
}

async function doImportAlbatrosFlights() {
  const flights = albatrosState.flights.filter(f => f.included);
  if (flights.length === 0) return alert('Aucun flight sélectionné.');

  // 1) Players updates
  const playerUpdates = {};
  const tempIds = new Map();
  let pCounter = 0;
  flights.forEach(fl => {
    fl.players.forEach(pl => {
      const key = pl.fullName.toLowerCase();
      if (pl.action === 'create') {
        if (!tempIds.has(key)) {
          const pid = 'p' + Date.now() + Math.floor(Math.random()*100000) + (pCounter++);
          tempIds.set(key, pid);
          const data = { firstName: pl.firstName, name: pl.lastName };
          if (pl.hcp != null) data.hcp = pl.hcp;
          playerUpdates[pid] = data;
        }
      } else if (pl.action === 'update-hcp' && pl.matchedPid) {
        const ex = state.club.playersDB[pl.matchedPid];
        const data = { firstName: ex.firstName, name: ex.name };
        if (pl.hcp != null) data.hcp = pl.hcp;
        playerUpdates[pl.matchedPid] = data;
      }
    });
  });

  // 2) Flights to add
  const flightUpdates = {};
  const compPlayerIds = new Set(state.comp.playerIds || []);
  flights.forEach((fl, idx) => {
    const ids = [];
    fl.players.forEach(pl => {
      let pid = pl.matchedPid;
      if (pl.action === 'create') pid = tempIds.get(pl.fullName.toLowerCase());
      if (pid) { ids.push(pid); compPlayerIds.add(pid); }
    });
    if (ids.length === 0) return;
    const fid = 'f' + Date.now() + idx;
    flightUpdates[fid] = {
      name: fl.name,
      teeTime: fl.time,
      code: genPin(4),
      playerIds: ids
    };
  });

  try {
    if (Object.keys(playerUpdates).length > 0) {
      await dbRef.child('clubs/' + state.clubCode + '/playersDB').update(playerUpdates);
    }
    const cPath = 'clubs/' + state.clubCode + '/competitions/' + state.compId;
    await dbRef.child(cPath + '/flights').update(flightUpdates);
    await dbRef.child(cPath + '/playerIds').set([...compPlayerIds]);
    closeModal();
    alert(`Import OK · ${Object.keys(flightUpdates).length} flights · ${[...tempIds.values()].length} nouveaux joueurs`);
  } catch (err) { alert('Erreur: ' + err.message); }
}

function filterCompPicker(query) {
  const q = (query||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

  rows.forEach(row => {
    const search = (row.dataset.search||'').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    row.style.display = (!q || search.indexOf(q) !== -1) ? '' : 'none';
  });
  updateCompPickerCounter();
}
function selectAllVisibleComp(checked) {
  document.querySelectorAll('#comp-picker-list .checkbox-row').forEach(row => {
    if (row.style.display !== 'none') {
      const cb = row.querySelector('input[type=checkbox]');
      if (cb) cb.checked = checked;
    }
  });
  updateCompPickerCounter();
}
function updateCompPickerCounter() {
  const rows = document.querySelectorAll('#comp-picker-list .checkbox-row');
  let total = 0, vis = 0, checkedTotal = 0;
  rows.forEach(row => {
    total++;
    if (row.style.display !== 'none') vis++;
    const cb = row.querySelector('input[type=checkbox]');
    if (cb && cb.checked) checkedTotal++;
  });
  const el = $('comp-picker-counter');
  if (el) {
    if (vis === total) el.textContent = `${checkedTotal}/${total} cochés`;
    else el.textContent = `${vis}/${total} affichés · ${checkedTotal} cochés`;
  }
}

function saveCompPlayers() {

function removeCompPlayer(pid) {
  if (!confirm('Retirer ce joueur de la compétition ?')) return;
  const c = state.comp;
  const ids = (c.playerIds || []).filter(x => x !== pid);
  const path = 'clubs/' + state.clubCode + '/competitions/' + state.compId;
  dbRef.child(path + '/playerIds').set(ids);
  // Remove from all flights
  Object.keys(c.flights || {}).forEach(fid => {
    const fIds = (c.flights[fid].playerIds || []).filter(x => x !== pid);
    dbRef.child(path + '/flights/' + fid + '/playerIds').set(fIds);
  });
  // Remove scores
  dbRef.child(path + '/scores/' + pid).remove();
}

    html += '<div class="empty"><div class="empty-icon">🚩</div><div class="empty-text">Aucun flight.</div></div>';
  } else {
    html += `<input type="text" id="flights-search" placeholder="🔎 Rechercher (joueur, code, heure)..." value="${escapeHtml(currentQuery)}" oninput="filterFlightsList(this.value)" autocomplete="off" style="margin-bottom: 8px;">`;

      const players = playerIds.map(pid => playersDB[pid] || null);

        if (!p) return `<div class="flight-player-row"><span style="color:var(--muted);"><i>(supprimé)</i></span></div>`;
        return `<div class="flight-player-row">
          <span class="flight-player-name">${escapeHtml(p.firstName || '')} <b>${escapeHtml(p.name || '')}</b></span>
          ${p.hcp != null ? `<span class="flight-player-hcp">${p.hcp}</span>` : ''}
        </div>`;
      }).join('');
      const playerSearch = players.filter(p => p).map(p => (p.firstName||'')+' '+(p.name||'')).join(' ');
      const searchText = ((f.name||'') + ' ' + (f.teeTime||'') + ' ' + (f.code||'') + ' ' + playerSearch).toLowerCase();
      return `<div class="flight-card" data-search="${escapeHtml(searchText)}">
        <div class="flight-header">
          <div class="flight-meta">
            <div class="flight-name">${escapeHtml(f.name || 'Flight')}</div>
            <div class="flight-tee">${f.teeTime || '—'}</div>
          </div>

            <span class="flight-code-badge" onclick="showFlightCode('${fid}')" title="Agrandir">${f.code || '????'}</span>

            <button class="flight-icon-btn" onclick="editFlight('${fid}')" title="Renommer">✎</button>
            <button class="flight-icon-btn" onclick="assignFlightPlayers('${fid}')" title="Joueurs">👥</button>
            <button class="flight-icon-btn flight-icon-danger" onclick="deleteFlight('${fid}')" title="Supprimer">×</button>

        </div>
        ${players.length === 0
          ? `<div class="flight-empty">Aucun joueur assigné</div>`
          : `<div class="flight-players">${playersList}</div>`}
      </div>`;
    }).join('');
    html += `</div>`;
  }
  $('tab-flights').innerHTML = html;
  if (currentQuery) filterFlightsList(currentQuery);
}

function filterFlightsList(query) {
  const q = (query||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const cards = document.querySelectorAll('#flights-list-inner .flight-card');
  let visible = 0;
  cards.forEach(card => {
    const search = (card.dataset.search||'').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    const match = !q || search.indexOf(q) !== -1;
    card.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  const counter = $('flights-counter');
  if (counter && q) {
    counter.innerHTML = `🔎 <b>${visible}</b> flight${visible>1?'s':''} affiché${visible>1?'s':''} (sur ${cards.length})`;
  } else if (counter && !q) {
    const c = state.comp;
    const ids = Object.keys(c.flights || {});
    const total = ids.length;
    const inFl = ids.reduce((s,fid) => s + ((c.flights[fid].playerIds||[]).length), 0);
    const without = (c.playerIds||[]).length - inFl;
    counter.innerHTML = `<b>${total}</b> flight${total>1?'s':''} · <b>${inFl}</b> joueur${inFl>1?'s':''} en flight${without > 0 ? ` · <span style="color: var(--birdie);"><b>${without}</b> sans flight</span>` : ''}`;
  }
}

  const mode = state.flightPickerFilter || 'free';
  document.querySelectorAll('#fp-list .checkbox-row').forEach(row => {

    const isCur = row.dataset.current === '1';

    else row.dataset.filtered = '0';

function filterFP(query) {
  const q = (query||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  document.querySelectorAll('#fp-list .checkbox-row').forEach(row => {
    const search = (row.dataset.search||'').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    const matchSearch = !q || search.indexOf(q) !== -1;
    const filteredOut = row.dataset.filtered === '1';
    row.style.display = (matchSearch && !filteredOut) ? '' : 'none';
  });

function updateFPCounter() {
  let total = 0, vis = 0, ckd = 0;
  document.querySelectorAll('#fp-list .checkbox-row').forEach(row => {
    total++;
    if (row.style.display !== 'none') vis++;
    const cb = row.querySelector('input[type=checkbox]');
    if (cb && cb.checked) ckd++;
  });
  const el = $('fp-counter');
  if (el) {
    if (vis === total) el.textContent = `${ckd}/${total} cochés`;
    else el.textContent = `${vis}/${total} affichés · ${ckd} cochés`;
  }
}

/* ═══════════════════════════════════════════════════════════
   SCORE ENTRY — the famous stepper [- N +]
   ═══════════════════════════════════════════════════════════ */
async function enterMarker(pin) {
  const club = state.club;
  const comps = club.competitions || {};

  let foundComp = null, foundFlight = null, isFC = false;
  // 1) Try flight code
  outer:
  for (const cid in comps) {
    const flights = comps[cid].flights || {};
    for (const fid in flights) {
      if (flights[fid].code === pin) {
        foundComp = cid; foundFlight = fid;
        break outer;
      }
    }
  }
  // 2) Try Fore Caddy code
  if (!foundFlight) {
    for (const cid in comps) {
      if (comps[cid].foreCaddyCode === pin) {
        foundComp = cid;
        const flights = comps[cid].flights || {};
        const fids = Object.keys(flights).sort((a,b) => (flights[a].teeTime||'').localeCompare(flights[b].teeTime||''));
        if (fids.length > 0) { foundFlight = fids[0]; isFC = true; }
        break;
      }
    }
  }
  if (!foundComp || !foundFlight) return loginError('Code introuvable');

  state.role = isFC ? 'forecaddy' : 'marker';
  state.compId = foundComp;
  state.flightId = foundFlight;
  state.isForeCaddy = isFC;
  state.isAdminScoring = false;
  state.currentHole = 1;
  state.currentRound = 1;
  state.scoreReturnTo = null; // logout if back

  // Fore Caddy → new multi-flight view (3 flights per page)
  if (isFC) {
    state.fcmPage = 0;
    state.comp = (state.club.competitions || {})[state.compId];
    enterFCMulti();
    return;
  }

  show('screen-score');
  clearListeners();
  listen(dbRef.child('clubs/' + state.clubCode), 'value', snap => {
    const club = snap.val();
    if (!club) return logout();
    state.club = club;
    state.comp = (club.competitions || {})[state.compId];
    if (!state.comp) return logout();
    state.flight = (state.comp.flights || {})[state.flightId];
    if (!state.flight) {
      // pick another if Fore Caddy
      if (state.isForeCaddy) {
        const flights = state.comp.flights || {};
        const fids = Object.keys(flights).sort((a,b) => (flights[a].teeTime||'').localeCompare(flights[b].teeTime||''));
        if (fids.length > 0) {
          state.flightId = fids[0]; state.flight = flights[state.flightId];
        } else { return logout(); }
      } else { return logout(); }
    }
    renderScoreScreen();
  });
}

function prevHole() {
  if (state.currentHole > 1) {
    state.currentHole--;
    renderScoreScreen();
  }
}
function nextHole() {
  if (state.currentHole < 18) {
    state.currentHole++;
    renderScoreScreen();
  }
}

function renderScoreScreen() {
  const c = state.comp, f = state.flight;
  if (!c || !f) return;

  $('score-comp-name').textContent = c.name || '—';
  let info = (f.name || 'Flight') + (f.teeTime ? ' · ' + f.teeTime : '');
  if (state.isForeCaddy) info += ' · Fore Caddy';
  if (state.isAdminScoring) info += ' · Admin';
  $('score-flight-info').textContent = info;

  // Multi-flight switcher
  const showSwitcher = state.isForeCaddy || state.isAdminScoring;
  if (showSwitcher) {
    $('score-flight-switcher').classList.remove('hidden');
    const flights = c.flights || {};
    const fids = Object.keys(flights).sort((a,b) => (flights[a].teeTime||'').localeCompare(flights[b].teeTime||''));
    const select = $('score-flight-select');
    const round = state.currentRound;
    const totalHoles = c.holes === 36 ? 36 : 18;
    select.innerHTML = fids.map(fid => {
      const fl = flights[fid];
      const playerCount = (fl.playerIds || []).length;
      const scores = c.scores || {};
      let totalCells = 0, filledCells = 0;
      const rounds = c.holes === 36 ? 2 : 1;
      for (let r = 1; r <= rounds; r++) {
        const rKey = 'r' + r;
        (fl.playerIds || []).forEach(pid => {
          for (let i = 0; i < 18; i++) {
            totalCells++;
            if ((scores[pid] || {})[rKey] && (scores[pid][rKey][i] != null)) filledCells++;
          }
        });
      }
      const progress = totalCells === 0 ? '' : (filledCells === totalCells ? ' · ✓ Terminé' : ` · ${filledCells}/${totalCells}`);
      return `<option value="${fid}" ${fid === state.flightId ? 'selected' : ''}>${escapeHtml(fl.name || 'Flight')} · ${fl.teeTime || '—'}${progress}</option>`;
    }).join('');
  } else {
    $('score-flight-switcher').classList.add('hidden');
  }

  // Round switcher (36 holes only)
  if (c.holes === 36) {
    $('score-round-switcher').classList.remove('hidden');
    document.querySelectorAll('#score-round-switcher button').forEach(b => {
      const r = parseInt(b.dataset.round, 10);
      if (r === state.currentRound) {
        b.className = 'btn btn-fairway btn-sm';
      } else {
        b.className = 'btn btn-secondary btn-sm';
      }
      b.style.flex = '1';
    });
  } else {
    $('score-round-switcher').classList.add('hidden');
    state.currentRound = 1;
  }

  // Hole nav
  const holeIdx = state.currentHole - 1;
  const par = getHolePar(holeIdx, state.currentRound);
  $('hole-num').textContent = state.currentHole;
  $('hole-par').textContent = par;
  $('hole-prev').disabled = (state.currentHole === 1);
  $('hole-next').disabled = (state.currentHole === 18);

  // Player cards with stepper
  const playerIds = f.playerIds || [];
  const playersDB = state.club.playersDB || {};
  const scores = c.scores || {};
  const rKey = 'r' + state.currentRound;

  if (playerIds.length === 0) {
    $('score-players').innerHTML = '<div class="empty"><div class="empty-icon">👤</div><div class="empty-text">Aucun joueur dans ce flight.</div></div>';
    return;
  }

  $('score-players').innerHTML = playerIds.map(pid => {
    const p = playersDB[pid] || { name:'?' };
    const playerScores = (scores[pid] || {})[rKey] || {};
    const strokes = playerScores[holeIdx]; // null if not entered
    const cls = scoreClass(strokes, par);
    const label = scoreLabel(strokes, par) || (strokes == null ? 'Saisir' : '');
    const total = getPlayerTotal(pid);
    const totalDisp = total.holesPlayed > 0 ? `${total.strokes} en ${total.holesPlayed} trou${total.holesPlayed>1?'s':''}` : '0 trou joué';
    return `<div class="player-score-card">
      <div class="player-score-header">
        <div class="player-score-name">${escapeHtml(getFullName(p))}${p.hcp != null ? ` <span style="font-weight: 400; color: var(--muted); font-size: 13px;">(${p.hcp})</span>` : ''}</div>
        <div class="player-score-total">${totalDisp}</div>
      </div>
      <div class="stepper">
        <button class="stepper-btn" onclick="changeScore('${pid}', -1)" ${strokes != null && strokes <= 1 ? 'disabled' : ''}>−</button>
        <div class="stepper-display ${cls}">
          <div class="stepper-value">${strokes != null ? strokes : '–'}</div>
          <div class="stepper-label">${label}</div>
        </div>
        <button class="stepper-btn" onclick="changeScore('${pid}', 1)">+</button>
      </div>
    </div>`;
  }).join('');
}

// Click on +/-: changes the score for current hole.
// If no score yet, first click sets to par + delta (so + sets to par+1, - sets to par-1)
// Actually: first click should set to par + delta. But user expects: first click on + → par+1.
// Wait: for stroke play, the natural "default" before first click is "par" (the par of the hole).
// Logic: if no score: + sets to par+1, - sets to par-1.
// If score set: +/- changes by 1.
function changeScore(pid, delta) {
  const holeIdx = state.currentHole - 1;
  const par = getHolePar(holeIdx, state.currentRound);
  const c = state.comp;
  const playerScores = ((c.scores || {})[pid] || {})['r' + state.currentRound] || {};
  let current = playerScores[holeIdx];
  let newVal;
  if (current == null) {
    newVal = par + delta; // first click: par +/- 1
    if (newVal < 1) newVal = 1;
  } else {
    newVal = current + delta;
    if (newVal < 1) newVal = 1;
    if (newVal > 20) newVal = 20;
  }
  const path = 'clubs/' + state.clubCode + '/competitions/' + state.compId
              + '/scores/' + pid + '/r' + state.currentRound + '/' + holeIdx;
  dbRef.child(path).set(newVal);
}

/* ═══════════════════════════════════════════════════════════
   FORE CADDY MULTI-FLIGHT VIEW (3 flights per page)
   ═══════════════════════════════════════════════════════════ */
const FCM_PER_PAGE = 3;

function enterFCMulti() {
  // Called when login matches a foreCaddyCode → use multi-flight view
  state.currentRound = 1;
  state.fcmPage = 0; // page index (0-based)
  state.fcmFlightHoles = {}; // per-flight current hole (default 1)
  state.scoreReturnTo = null;
  show('screen-fc-multi');
  clearListeners();
  listen(dbRef.child('clubs/' + state.clubCode), 'value', snap => {
    const club = snap.val();
    if (!club) return logout();
    state.club = club;
    state.comp = (club.competitions || {})[state.compId];
    if (!state.comp) return logout();
    // On first load, save Par as default score on hole 1 for all flights
    if (!state.fcmInitialized) {
      state.fcmInitialized = true;
      const flights = state.comp.flights || {};
      Object.keys(flights).forEach(fid => {
        saveDefaultParForFlight(fid, 1);
      });
    }
    renderFCMulti();
  });
}

// Admin shortcut: open FC multi-flight view from admin
function adminEnterFCMulti() {
  state.currentRound = 1;
  state.fcmPage = 0;
  state.fcmFlightHoles = {};
  state.fcmInitialized = false;
  state.scoreReturnTo = 'screen-comp';
  state.isAdminScoring = true;
  show('screen-fc-multi');
  // Save Par on hole 1 for all flights
  const flights = state.comp.flights || {};
  Object.keys(flights).forEach(fid => {
    saveDefaultParForFlight(fid, 1);
  });
  renderFCMulti();
}

function fcMultiBack() {
  if (state.scoreReturnTo) {
    state.isAdminScoring = false;
    show(state.scoreReturnTo);
    state.scoreReturnTo = null;
  } else {
    logout();
  }
}

function fcmSwitchRound(round) {
  state.currentRound = round;
  state.fcmFlightHoles = {}; // reset per-flight holes for new round
  // Save par for hole 1 of all flights for this round
  const flights = state.comp.flights || {};
  Object.keys(flights).forEach(fid => {
    saveDefaultParForFlight(fid, 1);
  });
  renderFCMulti();
}

// Per-flight hole navigation (saves the current hole index per flight)
// Hole indices are stored in state.fcmFlightHoles[fid] = 1..18

function fcmGetFlightHole(fid) {
  if (!state.fcmFlightHoles) state.fcmFlightHoles = {};
  return state.fcmFlightHoles[fid] || 1;
}
function fcmSetFlightHole(fid, hole) {
  if (!state.fcmFlightHoles) state.fcmFlightHoles = {};
  state.fcmFlightHoles[fid] = hole;
  // When we arrive at a new hole, save par as default score for all players
  saveDefaultParForFlight(fid, hole);
  renderFCMulti();
}
function fcmPrevHoleFlight(fid) {
  const h = fcmGetFlightHole(fid);
  if (h > 1) fcmSetFlightHole(fid, h - 1);
}
function fcmNextHoleFlight(fid) {
  const h = fcmGetFlightHole(fid);
  if (h < 18) fcmSetFlightHole(fid, h + 1);
}

// Save par as default score for all players of a flight at a given hole,
// only if they don't already have a score there
function saveDefaultParForFlight(fid, hole) {
  const c = state.comp;
  if (!c) return;
  const f = (c.flights || {})[fid];
  if (!f) return;
  const holeIdx = hole - 1;
  const par = getHolePar(holeIdx, state.currentRound);
  const rKey = 'r' + state.currentRound;
  const scores = c.scores || {};
  const playerIds = f.playerIds || [];
  const updates = {};
  playerIds.forEach(pid => {
    const playerScores = (scores[pid] || {})[rKey] || {};
    if (playerScores[holeIdx] == null) {
      updates['scores/' + pid + '/' + rKey + '/' + holeIdx] = par;
    }
  });
  if (Object.keys(updates).length > 0) {
    dbRef.child('clubs/' + state.clubCode + '/competitions/' + state.compId).update(updates);
  }
}

function fcmPrevPage() {
  if (state.fcmPage > 0) {
    state.fcmPage--;
    renderFCMulti();
  }
}
function fcmNextPage() {
  const c = state.comp;
  if (!c) return;
  const totalFlights = Object.keys(c.flights || {}).length;
  const maxPage = Math.max(0, Math.ceil(totalFlights / FCM_PER_PAGE) - 1);
  if (state.fcmPage < maxPage) {
    state.fcmPage++;
    renderFCMulti();
  }
}

function renderFCMulti() {
  const c = state.comp;
  if (!c) return;
  $('fcm-comp-name').textContent = c.name || '—';

  let info = c.holes + ' trous · ' + (c.scoring === 'net' ? 'NET' : 'BRUT');
  if (state.isAdminScoring) info += ' · Admin';
  else info += ' · Fore Caddy';
  $('fcm-info').textContent = info;

  // Round switcher
  if (c.holes === 36) {
    $('fcm-round-switcher').classList.remove('hidden');
    document.querySelectorAll('#fcm-round-switcher button').forEach(b => {
      const r = parseInt(b.dataset.round, 10);
      b.className = (r === state.currentRound) ? 'btn btn-fairway btn-sm' : 'btn btn-secondary btn-sm';
      b.style.flex = '1';
    });
  } else {
    $('fcm-round-switcher').classList.add('hidden');
    state.currentRound = 1;
  }

  // Flights (sorted by tee time)
  const flights = c.flights || {};
  const fids = Object.keys(flights).sort((a,b) => (flights[a].teeTime||'').localeCompare(flights[b].teeTime||''));
  const totalFlights = fids.length;
  const totalPages = Math.max(1, Math.ceil(totalFlights / FCM_PER_PAGE));

  // Clamp page
  if (state.fcmPage >= totalPages) state.fcmPage = totalPages - 1;
  if (state.fcmPage < 0) state.fcmPage = 0;

  const startIdx = state.fcmPage * FCM_PER_PAGE;
  const endIdx = Math.min(startIdx + FCM_PER_PAGE, totalFlights);
  const pageFids = fids.slice(startIdx, endIdx);

  const playersDB = state.club.playersDB || {};
  const scores = c.scores || {};
  const rKey = 'r' + state.currentRound;

  let html = '';
  if (totalFlights === 0) {
    html = '<div class="empty"><div class="empty-icon">🚩</div><div class="empty-text">Aucun flight dans cette compétition.</div></div>';
  } else {
    html = pageFids.map(fid => {
      const f = flights[fid];
      const playerIds = f.playerIds || [];

      // Per-flight current hole
      const currentHole = fcmGetFlightHole(fid);
      const holeIdx = currentHole - 1;
      const par = getHolePar(holeIdx, state.currentRound);

      if (playerIds.length === 0) {
        return `<div class="fcm-flight">
          <div class="fcm-flight-header">
            <div class="fcm-flight-name">${escapeHtml(f.name || 'Flight')}</div>
            <div class="fcm-flight-tee">${f.teeTime || '—'}</div>
          </div>
          <div class="flight-empty">Aucun joueur</div>
        </div>`;
      }

      // Per-flight hole bar
      const holeBar = `
        <div class="fcm-hole-bar">
          <button class="fcm-hole-nav-btn" onclick="fcmPrevHoleFlight('${fid}')" ${currentHole === 1 ? 'disabled' : ''}>‹</button>
          <div class="fcm-hole-info">
            <div class="fcm-hole-num-text">Trou ${currentHole}</div>
            <div class="fcm-hole-par-text">PAR ${par}</div>
          </div>
          <button class="fcm-hole-nav-btn" onclick="fcmNextHoleFlight('${fid}')" ${currentHole === 18 ? 'disabled' : ''}>›</button>
        </div>`;

      const rows = playerIds.map(pid => {
        const p = playersDB[pid] || { name: '?' };
        const playerScores = (scores[pid] || {})[rKey] || {};
        const strokes = playerScores[holeIdx];
        const cls = scoreClass(strokes, par);
        const label = scoreLabel(strokes, par) || (strokes == null ? 'Saisir' : '');
        return `<div class="fcm-row">
          <div>
            <div class="fcm-row-name">${escapeHtml(getFullName(p))}</div>
            ${p.hcp != null ? `<div class="fcm-row-name-meta">Hcp ${p.hcp}</div>` : ''}
          </div>
          <div class="fcm-stepper">
            <button class="fcm-stepper-btn" onclick="fcmChangeScore('${pid}', '${fid}', -1)" ${strokes != null && strokes <= 1 ? 'disabled' : ''}>−</button>
            <div class="fcm-stepper-display ${cls}">
              <div class="fcm-stepper-value">${strokes != null ? strokes : '–'}</div>
              ${label ? `<div class="fcm-stepper-label">${label}</div>` : ''}
            </div>
            <button class="fcm-stepper-btn" onclick="fcmChangeScore('${pid}', '${fid}', 1)">+</button>
          </div>
        </div>`;
      }).join('');
      return `<div class="fcm-flight">
        <div class="fcm-flight-header">
          <div class="fcm-flight-name">${escapeHtml(f.name || 'Flight')}</div>
          <div class="fcm-flight-tee">${f.teeTime || '—'}</div>
        </div>
        ${holeBar}
        ${rows}
      </div>`;
    }).join('');
  }
  $('fcm-flights').innerHTML = html;

  // Page info / nav
  if (totalPages > 1) {
    $('fcm-page-nav').style.display = 'flex';
    $('fcm-page-info').innerHTML = `Page <b>${state.fcmPage + 1}</b>/${totalPages}`;
    $('fcm-page-prev').disabled = (state.fcmPage === 0);
    $('fcm-page-next').disabled = (state.fcmPage === totalPages - 1);
  } else {
    $('fcm-page-nav').style.display = 'none';
  }
}

function fcmChangeScore(pid, fid, delta) {
  const currentHole = fcmGetFlightHole(fid);
  const holeIdx = currentHole - 1;
  const par = getHolePar(holeIdx, state.currentRound);
  const c = state.comp;
  const playerScores = ((c.scores || {})[pid] || {})['r' + state.currentRound] || {};
  let current = playerScores[holeIdx];
  let newVal;
  if (current == null) {
    newVal = par + delta;
    if (newVal < 1) newVal = 1;
  } else {
    newVal = current + delta;
    if (newVal < 1) newVal = 1;
    if (newVal > 20) newVal = 20;
  }
  const path = 'clubs/' + state.clubCode + '/competitions/' + state.compId
              + '/scores/' + pid + '/r' + state.currentRound + '/' + holeIdx;
  dbRef.child(path).set(newVal);
}

/* ═══════════════════════════════════════════════════════════
   LEADERBOARDS
   ═══════════════════════════════════════════════════════════ */
// Compute per-round data: { strokes, holesPlayed, projected (strokes + par of remaining holes) }
function getPlayerRoundData(playerId, round) {
  const c = state.comp;
  if (!c) return { strokes: 0, holesPlayed: 0, projected: 0, finished: false };
  const scores = (c.scores || {})[playerId] || {};
  const rScores = scores['r' + round] || {};
  let strokes = 0, holesPlayed = 0, parRemaining = 0;
  for (let i = 0; i < 18; i++) {
    if (rScores[i] != null) {
      strokes += rScores[i];
      holesPlayed++;
    } else {
      parRemaining += getHolePar(i, round);
    }
  }
  return {
    strokes,
    holesPlayed,
    projected: strokes + parRemaining,
    finished: holesPlayed === 18
  };
}

function buildLeaderboardData() {
  const c = state.comp;
  if (!c) return [];
  const playersDB = state.club.playersDB || {};
  const playerIds = c.playerIds || [];
  const isNet = c.scoring === 'net';
  const nRounds = c.holes === 36 ? 2 : 1;

  const data = playerIds.map(pid => {
    const p = playersDB[pid] || { name: '?' };

    // Per round data (always populate r1; r2 only if 36 holes)
    const r1 = getPlayerRoundData(pid, 1);
    const r2 = nRounds === 2 ? getPlayerRoundData(pid, 2) : null;

    // Total projected (strokes played + par of remaining holes across all rounds)
    const totalProjected = r1.projected + (r2 ? r2.projected : 0);
    const totalStrokes = r1.strokes + (r2 ? r2.strokes : 0);
    const totalHolesPlayed = r1.holesPlayed + (r2 ? r2.holesPlayed : 0);
    const totalHoles = nRounds === 2 ? 36 : 18;
    const allFinished = totalHolesPlayed === totalHoles;

    // Net: subtract handicap from total (applied once on total)
    let netTotal = totalProjected;
    if (isNet && p.hcp != null) {
      netTotal = Math.round(totalProjected - p.hcp);
    }

    return {
      pid, p,
      name: getFullName(p),
      hcp: p.hcp,
      r1, r2,
      totalProjected,
      totalStrokes,
      netTotal,
      totalHolesPlayed,
      totalHoles,
      allFinished
    };
  });

  // Sort: ascending by total (lowest = best)
  // Players who haven't started any hole go to the bottom
  data.sort((a, b) => {
    if (a.totalHolesPlayed === 0 && b.totalHolesPlayed > 0) return 1;
    if (b.totalHolesPlayed === 0 && a.totalHolesPlayed > 0) return -1;
    const aS = isNet ? a.netTotal : a.totalProjected;
    const bS = isNet ? b.netTotal : b.totalProjected;
    return aS - bS;
  });

  return data;
}

// Build the leaderboard HTML table (shared between admin and public views)
function renderLeaderboardTable(data, comp) {
  if (data.length === 0) {
    return '<div class="empty"><div class="empty-icon">🏆</div><div class="empty-text">Aucun joueur dans la compétition.</div></div>';
  }
  const isNet = comp.scoring === 'net';
  const is36 = comp.holes === 36;

  // Helper: render a round cell. Show projected with * if not finished, or just strokes if finished.
  function roundCell(round) {
    if (!round || round.holesPlayed === 0) return '<span style="color: var(--muted);">—</span>';
    if (round.finished) {
      return `<span>${round.strokes}</span>`;
    }
    // Projection: strokes played + par of remaining
    return `<span style="color: #C2410C;" title="${round.holesPlayed}/18 trous joués + projection au par">${round.projected}*</span>`;
  }

  function totalCell(d) {
    if (d.totalHolesPlayed === 0) return '<span style="color: var(--muted);">—</span>';
    const val = isNet ? d.netTotal : d.totalProjected;
    if (d.allFinished) {
      return `<span>${val}</span>`;
    }
    return `<span style="color: #C2410C;" title="${d.totalHolesPlayed}/${d.totalHoles} trous joués + projection au par">${val}*</span>`;
  }

  // Column layout
  // 18 trous: # | Joueur | Hcp | Total
  // 36 trous: # | Joueur | Hcp | Tour 1 | Tour 2 | Total
  const colTemplate = is36
    ? 'grid-template-columns: 32px 1fr 50px 50px 50px 60px;'
    : 'grid-template-columns: 32px 1fr 50px 60px;';

  let html = `<div class="leader-table">
    <div class="leader-row leader-header" style="${colTemplate}">
      <div>#</div>
      <div>Joueur</div>
      <div style="text-align:right;">Hcp</div>
      ${is36 ? '<div style="text-align:right;">T1</div><div style="text-align:right;">T2</div>' : ''}
      <div style="text-align:right;">${isNet ? 'NET' : 'Total'}</div>
    </div>`;

  data.forEach((d, i) => {
    const pos = d.totalHolesPlayed === 0 ? '—' : (i + 1);
    html += `<div class="leader-row" style="${colTemplate}">
      <div class="leader-pos">${pos}</div>
      <div>
        <div class="leader-name">${escapeHtml(d.name)}</div>
        <div class="leader-name-meta">${d.totalHolesPlayed}/${d.totalHoles} trous</div>
      </div>
      <div style="text-align:right; font-size: 13px; color: var(--muted);">${d.hcp != null ? d.hcp : '—'}</div>
      ${is36 ? `
        <div class="leader-score-net" style="text-align:right;">${roundCell(d.r1)}</div>
        <div class="leader-score-net" style="text-align:right;">${roundCell(d.r2)}</div>
      ` : ''}
      <div class="leader-score-net" style="text-align:right; font-weight: 700;">${totalCell(d)}</div>
    </div>`;
  });

  html += '</div>';

  // Legend
  const hasProjections = data.some(d => d.totalHolesPlayed > 0 && !d.allFinished);
  if (hasProjections) {
    html += `<div style="margin-top: 12px; font-size: 12px; color: var(--muted); text-align: center;">
      <span style="color: #C2410C; font-weight: 600;">*</span> Score projeté (strokes joués + par des trous restants)
    </div>`;
  }
  return html;
}

function renderCompLeaderboard() {
  const c = state.comp;
  const data = buildLeaderboardData();
  const isNet = c.scoring === 'net';

  let html = `
    <div class="card">
      <div class="card-title">Classement live · ${isNet ? 'NET' : 'BRUT'}</div>
      <div class="card-meta">${c.holes} trous · ${data.length} joueur${data.length>1?'s':''}</div>
    </div>
  `;
  html += renderLeaderboardTable(data, c);
  $('tab-leaderboard').innerHTML = html;
}

function leaderboardBack() {
  if (state.lbReturnTo) {
    show(state.lbReturnTo);
    state.lbReturnTo = null;
  } else if (state.role === 'admin') {
    show('screen-comp');
    setCompTab('leaderboard');
  } else if ($('screen-fc-multi').classList.contains('active') || state.role === 'forecaddy') {
    show('screen-fc-multi');
  } else {
    show('screen-score');
  }
}

function renderPublicLeaderboard() {
  // Detect which screen we came from
  if ($('screen-score').classList.contains('active')) state.lbReturnTo = 'screen-score';
  else if ($('screen-fc-multi').classList.contains('active')) state.lbReturnTo = 'screen-fc-multi';
  else state.lbReturnTo = null;

  const c = state.comp;
  if (!c) return;
  const data = buildLeaderboardData();
  const isNet = c.scoring === 'net';

  $('lb-pub-comp-name').textContent = c.name || 'Classement';
  $('lb-pub-info').textContent = `${c.holes} trous · ${isNet ? 'NET' : 'BRUT'}`;
  $('lb-pub-content').innerHTML = renderLeaderboardTable(data, c);
}
